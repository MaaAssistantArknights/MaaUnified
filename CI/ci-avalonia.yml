name: Build MAAUnified Debug Packages

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/MAAUnified"
      - "src/MAAUnified/**"
      - "src/MaaCore/**"
      - "src/MaaUtils/**"
      - "include/**"
      - "resource/**"
      - "tools/maadeps-download.py"
      - "CMakeLists.txt"
      - "CMakePresets.json"
  push:
    branches:
      - dev
    paths:
      - "src/MAAUnified"
      - "src/MAAUnified/**"
      - "src/MaaCore/**"
      - "src/MaaUtils/**"
      - "include/**"
      - "resource/**"
      - "tools/maadeps-download.py"
      - "CMakeLists.txt"
      - "CMakePresets.json"

jobs:
  meta:
    name: Resolve debug build metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.out.outputs.tag }}
      version_suffix: ${{ steps.out.outputs.version_suffix }}
      informational_version: ${{ steps.out.outputs.informational_version }}
    steps:
      - id: out
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "tag=debug-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "version_suffix=debug.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "informational_version=debug-${short_sha}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: meta
    runs-on: ${{ matrix.os }}
    env:
      MAAUNIFIED_STAGING_DIR: ${{ runner.temp }}/maaunified-staging
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            rid: win-x64
            self_contained: true
            cmake_preset: windows-unified-publish-x64
            maadeps_triplet: x64-windows
          - name: linux-x64
            os: ubuntu-latest
            rid: linux-x64
            self_contained: true
            cmake_preset: linux-publish-x64
            maadeps_triplet: x64-linux
          - name: macos-x64
            os: macos-latest
            rid: osx-x64
            self_contained: true
            cmake_preset: macos-publish-x64
            maadeps_triplet: x64-osx
          - name: macos-arm64
            os: macos-latest
            rid: osx-arm64
            self_contained: true
            cmake_preset: macos-publish-arm64
            maadeps_triplet: arm64-osx

    steps:
      - uses: actions/checkout@v6

      - name: Fetch required submodules
        shell: bash
        run: bash ./.github/scripts/sync-optional-submodules.sh --init --depth 1 src/MAAUnified src/MaaUtils

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dmgbuild (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: python3 -m pip install dmgbuild

      - name: Restore app
        run: dotnet restore src/MAAUnified/App/MAAUnified.App.csproj

      - name: Restore tests
        if: runner.os != 'macOS'
        run: dotnet restore src/MAAUnified/Tests/MAAUnified.Tests.csproj

      - name: Run Linux baseline consistency gate
        if: matrix.name == 'linux-x64'
        run: >
          dotnet test src/MAAUnified/Tests/MAAUnified.Tests.csproj -c Release --no-restore --disable-build-servers -m:1
          --results-directory TestResults/${{ matrix.name }}
          --logger "trx;LogFileName=baseline-consistency.trx"
          --filter "FullyQualifiedName~BaselineContractTests|FullyQualifiedName~BaselineCoverageTests|FullyQualifiedName~BaselineRenderSyncTests|FullyQualifiedName~ParityMatrixSyncTests"

      - name: Run Linux full MAAUnified test gate
        if: matrix.name == 'linux-x64'
        run: >
          dotnet test src/MAAUnified/Tests/MAAUnified.Tests.csproj -c Release --no-restore --disable-build-servers -m:1
          --results-directory TestResults/${{ matrix.name }}
          --logger "trx;LogFileName=full-maaunified-tests.trx"

      - name: Run Windows platform capability contract gate
        if: matrix.name == 'windows-x64'
        run: >
          dotnet test src/MAAUnified/Tests/MAAUnified.Tests.csproj -c Release --no-restore --disable-build-servers -m:1
          --results-directory TestResults/${{ matrix.name }}
          --logger "trx;LogFileName=platform-capability-contract.trx"
          --filter "FullyQualifiedName~PlatformCapabilityContractTests"

      - name: Run Windows native capability smoke gate
        if: matrix.name == 'windows-x64'
        run: >
          dotnet test src/MAAUnified/Tests/MAAUnified.Tests.csproj -c Release --no-restore --disable-build-servers -m:1
          --results-directory TestResults/${{ matrix.name }}
          --logger "trx;LogFileName=platform-windows-native-smoke.trx"
          --filter "FullyQualifiedName~PlatformWindowsNativeSmokeTests"

      - name: Upload test result artifacts on failure
        if: failure() && runner.os != 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: MAAUnified-TestResults-${{ matrix.name }}
          path: TestResults/${{ matrix.name }}/*.trx
          if-no-files-found: ignore

      - name: Resolve macOS signing availability
        if: runner.os == 'macOS'
        id: macos_signing
        shell: bash
        env:
          SIGN_CERT_P12: ${{ secrets.HGUANDL_SIGN_CERT_P12 }}
          SIGN_CERT_PASSWORD: ${{ secrets.HGUANDL_SIGN_CERT_PASSWD }}
          APPSTORE_KEYID: ${{ secrets.HGUANDL_APPSTORE_KEYID }}
          APPSTORE_KEY: ${{ secrets.HGUANDL_APPSTORE_KEY }}
          APPSTORE_ISSUER: ${{ secrets.HGUANDL_APPSTORE_ISSUER }}
        run: |
          if [[ -n "$SIGN_CERT_P12" && -n "$SIGN_CERT_PASSWORD" && -n "$APPSTORE_KEYID" && -n "$APPSTORE_KEY" && -n "$APPSTORE_ISSUER" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "macOS signing and notarization secrets are available."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "macOS signing and notarization secrets are incomplete; unsigned dmg will be produced."
          fi

      - name: Install Developer ID certificate
        if: runner.os == 'macOS' && steps.macos_signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.HGUANDL_SIGN_CERT_P12 }}
          p12-password: ${{ secrets.HGUANDL_SIGN_CERT_PASSWD }}

      - name: Bootstrap MaaDeps
        run: python tools/maadeps-download.py ${{ matrix.maadeps_triplet }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure MaaCore runtime
        run: |
          cmake --preset ${{ matrix.cmake_preset }} -DINSTALL_PYTHON=OFF -DMAA_HASH_VERSION='${{ needs.meta.outputs.tag }}'

      - name: Validate Windows Unified preset isolation
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cachePath = "build/CMakeCache.txt"
          if (!(Test-Path $cachePath)) { throw "CMake cache not found at $cachePath." }

          $cache = Get-Content $cachePath -Raw
          if ($cache -notmatch 'BUILD_WPF_GUI:BOOL=OFF') {
            throw "Unified Windows preset must keep BUILD_WPF_GUI=OFF."
          }

          $solution = Get-ChildItem build -Filter *.sln | Select-Object -First 1
          if ($null -eq $solution) { throw "Generated Visual Studio solution not found under build/." }

          if (Select-String -Path $solution.FullName -Pattern 'MaaWpfGui(\.csproj)?' -Quiet) {
            throw "Unified Windows solution unexpectedly includes MaaWpfGui."
          }

      - name: Build MaaCore runtime
        run: |
          cmake --build --preset ${{ matrix.cmake_preset }}
          cmake --install build --config RelWithDebInfo

      - name: Publish MAAUnified app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          dotnet publish src/MAAUnified/App/MAAUnified.App.csproj -c Release -r ${{ matrix.rid }}
          --self-contained ${{ matrix.self_contained }} -o "$env:MAAUNIFIED_STAGING_DIR"
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:VersionPrefix=1.0.0
          -p:VersionSuffix=${{ needs.meta.outputs.version_suffix }}
          -p:AssemblyVersion=1.0.0.0
          -p:FileVersion=1.0.0.0
          -p:InformationalVersion="${{ needs.meta.outputs.informational_version }}"
          -p:MaaUnifiedReleaseChannel=debug
          -p:MaaUnifiedDiagnosticsProfile=full

      - name: Publish MAAUnified app (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: >
          dotnet publish src/MAAUnified/App/MAAUnified.App.csproj -c Release -r ${{ matrix.rid }}
          --self-contained ${{ matrix.self_contained }} -o "$MAAUNIFIED_STAGING_DIR/bin"
          -p:VersionPrefix=1.0.0
          -p:VersionSuffix=${{ needs.meta.outputs.version_suffix }}
          -p:AssemblyVersion=1.0.0.0
          -p:FileVersion=1.0.0.0
          -p:InformationalVersion="${{ needs.meta.outputs.informational_version }}"
          -p:MaaUnifiedReleaseChannel=debug
          -p:MaaUnifiedDiagnosticsProfile=full

      - name: Merge MaaCore runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stagingDir = $env:MAAUNIFIED_STAGING_DIR
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          Copy-Item install\* $stagingDir -Recurse -Force
          if (!(Test-Path (Join-Path $stagingDir "MaaCore.dll"))) { throw "MaaCore.dll not found in staging output." }
          if (!(Test-Path (Join-Path $stagingDir "resource"))) { throw "resource directory not found in staging output." }

      - name: Merge MaaCore runtime (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          staging_dir="$MAAUNIFIED_STAGING_DIR"
          mkdir -p "$staging_dir"
          cp -a install/. "$staging_dir/"
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            test -f "$staging_dir/libMaaCore.so"
          else
            test -f "$staging_dir/libMaaCore.dylib"
          fi
          test -d "$staging_dir/resource"

      - name: Create root launcher scripts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: bash src/MAAUnified/CI/create-unix-launchers.sh "$MAAUNIFIED_STAGING_DIR" linux

      - name: Validate staging layout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stagingDir = $env:MAAUNIFIED_STAGING_DIR
          if (!(Test-Path (Join-Path $stagingDir "MAAUnified.exe"))) { throw "Windows GUI executable not found at staging root." }
          if (!(Test-Path (Join-Path $stagingDir "resource"))) { throw "resource directory not found under staging root." }
          if (Test-Path (Join-Path $stagingDir "MAAUnified.cmd")) { throw "Legacy cmd launcher should not be included in Windows package." }
          $rootManaged = @(Get-ChildItem $stagingDir -File | Where-Object { $_.Name -like 'System.*.dll' -or $_.Name -like 'Avalonia.*.dll' })
          if ($rootManaged.Count -gt 0) { throw "Managed DLLs should not be placed at staging root." }

      - name: Validate staging layout (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          staging_dir="$MAAUNIFIED_STAGING_DIR"
          test -x "$staging_dir/bin/MAAUnified"
          test -d "$staging_dir/resource"
          test -x "$staging_dir/MAAUnified"
          test -x "$staging_dir/MAAUnified.sh"
          ! find "$staging_dir" -maxdepth 1 -type f \( -name 'System.*.dll' -o -name 'Avalonia.*.dll' \) | grep -q .

      - name: Validate staging layout (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          staging_dir="$MAAUNIFIED_STAGING_DIR"
          test -x "$staging_dir/bin/MAAUnified"
          test -f "$staging_dir/libMaaCore.dylib"
          test -d "$staging_dir/resource"
          ! test -e "$staging_dir/MAAUnified.command"
          ! find "$staging_dir" -maxdepth 1 -type f \( -name 'System.*.dll' -o -name 'Avalonia.*.dll' \) | grep -q .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          $name = "MAAUnified-${{ needs.meta.outputs.tag }}-${{ matrix.name }}"
          Compress-Archive -Path "$env:MAAUNIFIED_STAGING_DIR\*" -DestinationPath "release\$name.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release
          name="MAAUnified-${{ needs.meta.outputs.tag }}-${{ matrix.name }}"
          tar -czf "release/${name}.tar.gz" -C "$MAAUNIFIED_STAGING_DIR" .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CODESIGN_ENABLED: ${{ steps.macos_signing.outputs.available }}
        run: |
          mkdir -p release
          name="MAAUnified-${{ needs.meta.outputs.tag }}-${{ matrix.name }}"
          bash src/MAAUnified/CI/create-macos-app-dmg.sh \
            "$MAAUNIFIED_STAGING_DIR" \
            release \
            "$name" \
            "1.0.0" \
            "${{ needs.meta.outputs.informational_version }}"
          test -f "release/${name}.dmg"
          ! find release -type f -name '*macos*.tar.gz' | grep -q .
          ! find release -name 'MAAUnified.command' | grep -q .
          rm -rf release/MAAUnified.app

      - name: Notarize macOS dmg
        if: runner.os == 'macOS' && steps.macos_signing.outputs.available == 'true'
        shell: bash
        env:
          APPSTORE_KEYID: ${{ secrets.HGUANDL_APPSTORE_KEYID }}
          APPSTORE_KEY: ${{ secrets.HGUANDL_APPSTORE_KEY }}
          ISSUER_ID: ${{ secrets.HGUANDL_APPSTORE_ISSUER }}
        run: |
          cd release
          echo "$APPSTORE_KEY" > "AuthKey_${APPSTORE_KEYID}.p8"
          dmg="MAAUnified-${{ needs.meta.outputs.tag }}-${{ matrix.name }}.dmg"
          xcrun notarytool submit -k "AuthKey_${APPSTORE_KEYID}.p8" -d "$APPSTORE_KEYID" -i "$ISSUER_ID" --wait "$dmg"
          rm -f "AuthKey_${APPSTORE_KEYID}.p8"
          xcrun stapler staple "$dmg"
          spctl -a -t open --context context:primary-signature -v "$dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: MAAUnified-${{ needs.meta.outputs.tag }}-${{ matrix.name }}
          path: |
            release/*.zip
            release/*.tar.gz
            release/*.dmg
