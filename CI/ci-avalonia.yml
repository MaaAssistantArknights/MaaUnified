name: Build MAAUnified Debug Packages

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/MAAUnified"
      - "src/MAAUnified/**"
      - "src/MaaCore/**"
      - "src/MaaUtils/**"
      - "include/**"
      - "resource/**"
      - "tools/maadeps-download.py"
      - "CMakeLists.txt"
      - "CMakePresets.json"
  push:
    branches:
      - dev
    paths:
      - "src/MAAUnified"
      - "src/MAAUnified/**"
      - "src/MaaCore/**"
      - "src/MaaUtils/**"
      - "include/**"
      - "resource/**"
      - "tools/maadeps-download.py"
      - "CMakeLists.txt"
      - "CMakePresets.json"

jobs:
  meta:
    name: Resolve debug build metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.out.outputs.tag }}
      version_suffix: ${{ steps.out.outputs.version_suffix }}
      informational_version: ${{ steps.out.outputs.informational_version }}
    steps:
      - id: out
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "tag=debug-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "version_suffix=debug.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "informational_version=debug-${short_sha}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            rid: win-x64
            self_contained: true
            cmake_preset: windows-publish-x64
            maadeps_triplet: x64-windows
          - name: linux-x64
            os: ubuntu-latest
            rid: linux-x64
            self_contained: true
            cmake_preset: linux-publish-x64
            maadeps_triplet: x64-linux
          - name: macos-x64
            os: macos-latest
            rid: osx-x64
            self_contained: true
            cmake_preset: macos-publish-x64
            maadeps_triplet: x64-osx

    steps:
      - uses: actions/checkout@v6

      - name: Fetch required submodules
        shell: bash
        run: bash ./.github/scripts/sync-optional-submodules.sh --init --depth 1 src/MAAUnified src/MaaUtils

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Restore app
        run: dotnet restore src/MAAUnified/App/MAAUnified.App.csproj

      - name: Restore tests
        if: matrix.name != 'macos-x64'
        run: dotnet restore src/MAAUnified/Tests/MAAUnified.Tests.csproj

      - name: Run Linux baseline consistency gate
        if: matrix.name == 'linux-x64'
        run: >
          dotnet test src/MAAUnified/Tests/MAAUnified.Tests.csproj -c Release --no-restore --disable-build-servers -m:1
          --results-directory TestResults/${{ matrix.name }}
          --logger "trx;LogFileName=baseline-consistency.trx"
          --filter "FullyQualifiedName~BaselineContractTests|FullyQualifiedName~BaselineCoverageTests|FullyQualifiedName~BaselineRenderSyncTests|FullyQualifiedName~ParityMatrixSyncTests"

      - name: Run Linux full MAAUnified test gate
        if: matrix.name == 'linux-x64'
        run: >
          dotnet test src/MAAUnified/Tests/MAAUnified.Tests.csproj -c Release --no-restore --disable-build-servers -m:1
          --results-directory TestResults/${{ matrix.name }}
          --logger "trx;LogFileName=full-maaunified-tests.trx"

      - name: Run Windows platform capability contract gate
        if: matrix.name == 'windows-x64'
        run: >
          dotnet test src/MAAUnified/Tests/MAAUnified.Tests.csproj -c Release --no-restore --disable-build-servers -m:1
          --results-directory TestResults/${{ matrix.name }}
          --logger "trx;LogFileName=platform-capability-contract.trx"
          --filter "FullyQualifiedName~PlatformCapabilityContractTests"

      - name: Run Windows native capability smoke gate
        if: matrix.name == 'windows-x64'
        run: >
          dotnet test src/MAAUnified/Tests/MAAUnified.Tests.csproj -c Release --no-restore --disable-build-servers -m:1
          --results-directory TestResults/${{ matrix.name }}
          --logger "trx;LogFileName=platform-windows-native-smoke.trx"
          --filter "FullyQualifiedName~PlatformWindowsNativeSmokeTests"

      - name: Upload test result artifacts on failure
        if: failure() && matrix.name != 'macos-x64'
        uses: actions/upload-artifact@v6
        with:
          name: MAAUnified-TestResults-${{ matrix.name }}
          path: TestResults/${{ matrix.name }}/*.trx
          if-no-files-found: ignore

      - name: Bootstrap MaaDeps
        run: python tools/maadeps-download.py ${{ matrix.maadeps_triplet }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build MaaCore runtime
        run: |
          cmake --preset ${{ matrix.cmake_preset }} -DINSTALL_PYTHON=OFF -DMAA_HASH_VERSION='${{ needs.meta.outputs.tag }}'
          cmake --build --preset ${{ matrix.cmake_preset }}
          cmake --install build --config RelWithDebInfo

      - name: Publish MAAUnified app
        shell: bash
        run: >
          dotnet publish src/MAAUnified/App/MAAUnified.App.csproj -c Release -r ${{ matrix.rid }}
          --self-contained ${{ matrix.self_contained }} -o staging/bin
          -p:VersionPrefix=1.0.0
          -p:VersionSuffix=${{ needs.meta.outputs.version_suffix }}
          -p:AssemblyVersion=1.0.0.0
          -p:FileVersion=1.0.0.0
          -p:InformationalVersion="${{ needs.meta.outputs.informational_version }}"
          -p:MaaUnifiedReleaseChannel=debug
          -p:MaaUnifiedDiagnosticsProfile=full

      - name: Merge MaaCore runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging -Force | Out-Null
          Copy-Item install\* staging\ -Recurse -Force
          if (!(Test-Path "staging\MaaCore.dll")) { throw "MaaCore.dll not found in staging output." }
          if (!(Test-Path "staging\resource")) { throw "resource directory not found in staging output." }

      - name: Merge MaaCore runtime (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp -a install/. staging/
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            test -f staging/libMaaCore.so
          else
            test -f staging/libMaaCore.dylib
          fi
          test -d staging/resource

      - name: Create root launcher scripts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh -File src/MAAUnified/CI/create-windows-launcher.ps1 -TargetDir staging

      - name: Create root launcher scripts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            bash src/MAAUnified/CI/create-unix-launchers.sh staging macos
          else
            bash src/MAAUnified/CI/create-unix-launchers.sh staging linux
          fi

      - name: Validate staging layout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "staging\bin\MAAUnified.exe")) { throw "Managed app executable not found under staging/bin." }
          if (!(Test-Path "staging\resource")) { throw "resource directory not found under staging root." }
          if (!(Test-Path "staging\MAAUnified.cmd")) { throw "Root launcher script not found." }
          $rootManaged = @(Get-ChildItem staging -File | Where-Object { $_.Name -like 'System.*.dll' -or $_.Name -like 'Avalonia.*.dll' })
          if ($rootManaged.Count -gt 0) { throw "Managed DLLs should not be placed at staging root." }

      - name: Validate staging layout (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test -x staging/bin/MAAUnified
          test -d staging/resource
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            test -x staging/MAAUnified
            test -x staging/MAAUnified.command
          else
            test -x staging/MAAUnified
            test -x staging/MAAUnified.sh
          fi
          ! find staging -maxdepth 1 -type f \( -name 'System.*.dll' -o -name 'Avalonia.*.dll' \) | grep -q .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          $name = "MAAUnified-${{ needs.meta.outputs.tag }}-${{ matrix.name }}"
          Compress-Archive -Path staging\* -DestinationPath "release\$name.zip"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          name="MAAUnified-${{ needs.meta.outputs.tag }}-${{ matrix.name }}"
          tar -czf "release/${name}.tar.gz" -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: MAAUnified-${{ needs.meta.outputs.tag }}-${{ matrix.name }}
          path: release/*
